name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#20A7F3

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: chore: update contribution snake
          file_pattern: assets/github-contribution-grid-snake*.svg
          commit_user_name: Igor Borisov
          commit_user_email: bio24082005@mail.ru
          commit_author: Igor Borisov <bio24082005@mail.ru>
